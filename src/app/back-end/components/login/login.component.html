<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PPS Login</title>

  <!-- AdminLTE + Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #1099ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
      width: 380px;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      border: none;
      padding: 20px;
    }

    .card-body {
      padding: 30px 25px; /* increased height */
    }

    .login-logo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 20px;
    }

    .login-box-msg {
      text-align: center;
      color: #444;
      margin-bottom: 25px;
      font-size: 15px;
    }

    /* Grey border inputs */
    .form-control {
      border-radius: 8px;
      border: 1px solid #ccc;
      height: 45px;
      padding-right: 40px;
    }

    .form-control:focus {
      border-color: #999;
      box-shadow: none;
    }

    .input-group-text {
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-left: none;
    }

    .input-group .form-control {
      border-right: none;
    }

    /* Eye icon */
    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 45px;
      top: 12px;
      cursor: pointer;
      color: #777;
      z-index: 10;
    }

    .btn-primary {
      border-radius: 8px;
      background: #0d6efd;
      border: none;
      height: 45px;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #0b5ed7;
    }

    .remember-label {
      font-size: 14px;
      color: #333;
      margin-left: 5px;
    }

    .row {
      margin-top: 15px;
    }

  </style>
</head>

<body>

<div class="login-box">
  <div class="login-logo">PPS Login</div>

  <div class="card">
    <div class="card-body">

      <p class="login-box-msg">Sign in to your account</p>

      <form (ngSubmit)="login()">

        <!-- Username -->
        <div class="input-group mb-4">
          <input type="text"
                 class="form-control"
                 placeholder="Username"
                 [(ngModel)]="username"
                 name="username"
                 required>
          <div class="input-group-append">
            <div class="input-group-text">
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="input-group mb-4 password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'"
                 class="form-control"
                 placeholder="Password"
                 [(ngModel)]="password"
                 name="password"
                 required>

          <i class="fas"
             [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
             (click)="togglePassword()"
             class="toggle-eye"></i>

          <div class="input-group-append">
            <div class="input-group-text">
              <i class="fas fa-lock"></i>
            </div>
          </div>
        </div>

        <!-- Remember + Login -->
        <div class="row">
          <div class="col-6 d-flex align-items-center">
            <input type="checkbox" id="remember">
            <label for="remember" class="remember-label">Remember</label>
          </div>

          <div class="col-6">
            <button type="submit" class="btn btn-primary btn-block">
              Login
            </button>
          </div>
        </div>

      </form>

    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/plugins/jquery/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

</body>
</html>
