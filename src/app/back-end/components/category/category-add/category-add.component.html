<div class="card">
  <div class="card-header">
    <h5>Add Category</h5>
  </div>

  <form #catForm="ngForm" (ngSubmit)="saveCategory(catForm)">
    <div class="card-body">
      <!-- Alert -->
      <div
        *ngIf="isMessage === true"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div class="row mb-3">
        <div class="col-6 mb-3">
          <label class="form-label">
            Name <span class="text-danger">*</span>
          </label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="category.name"
            name="name"
            required
          />

          <!-- Validation -->
          <div
            class="text-danger mt-1"
            *ngIf="catForm.submitted && catForm.controls['name']?.invalid"
          >
            <small>Name is required</small>
          </div>
        </div>
      </div>
    </div>

    <div class="card-footer">
      <button class="btn btn-primary mr-3">{{isEdit ? "Update" : "Save"}}</button>
      <button type="button" class="btn btn-dark" (click)="handleBackBtn()">
        Back
      </button>
    </div>
  </form>
</div>
