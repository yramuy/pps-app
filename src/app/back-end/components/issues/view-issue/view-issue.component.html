<section class="content">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">View Issue Details</h3>
      </div>

      <!-- Loader -->
      <div
        id="pageLoader"
        *ngIf="loader.loading$ | async"
        class="text-center my-3"
      >
        <div class="spinner-border text-primary"></div>
      </div>

      <div class="card-body">
        <!-- 🔹 Image (Full Width) -->
        <div class="row mb-2">
          <div class="col-11">
            <img
              [src]="issueData.issue_pic"
              class="img-fluid w-100 rounded"
              style="height: 450px; object-fit: cover"
            />
          </div>
        </div>

        <!-- 🔹 Location -->
        <div class="row mb-3 justify-content-center">
          <div class="col-auto">
            <span class="d-flex align-items-center">
              <i class="fa fa-map-marker-alt text-danger me-2"></i>
              {{ issueData.assembly }}, {{ issueData.mandal }},
              {{ issueData.village }}
            </span>
          </div>
        </div>

        <!-- 🔹 Title (Left Align) -->
        <div class="row mb-2">
          <div class="col-10">
            <h4 class="fw-bold text-start">
              {{ issueData.issue_title }}
            </h4>
          </div>
        </div>

        <!-- 🔹 Description (Left Align) -->
        <div class="row">
          <div class="col-10">
            <p class="text-muted text-start" style="line-height: 1.6">
              {{ issueData.issue_description }}
            </p>
          </div>
        </div>

        <!-- 🔹 Comment Section -->
        <form #issueCmtForm="ngForm" (ngSubmit)="submitComment(issueCmtForm)">
          <div class="row justify-content-center mt-4">
            <div class="col-11">
              <!-- Label -->
              <label class="fw-bold mb-2">Add Comment *</label>

              <!-- Textarea -->
              <textarea
                class="form-control"
                name="issue_comment"
                [(ngModel)]="issue_comment"
                #issueComment="ngModel"
                rows="4"
                placeholder="Enter your comment..."
                required
              ></textarea>

              <!-- Validation Error -->
              <div
                *ngIf="issueComment.invalid && issueComment.touched"
                class="text-danger mt-1"
              >
                Comment is required
              </div>

              <!-- Submit Button -->
              <div class="mt-3 text-end">
                <button
                  type="submit"
                  class="btn btn-primary"
                  [disabled]="issueCmtForm.invalid || (loader.loading$ | async)"
                >
                  Submit Comment
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
